name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: althu123696
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & Push FastAPI
        run: |
          docker buildx build --push \
            -t ghcr.io/althu123696/ipl-ii/fastapi:latest \
            -f app/Dockerfile .

      - name: Build & Push Streamlit
        run: |
          docker buildx build --push \
            -t ghcr.io/althu123696/ipl-ii/streamlit:latest \
            -f streamlit/Dockerfile .

  deploy:
    runs-on: self-hosted
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Docker login (Windows runner)
        run: echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u althu123696 --password-stdin

      - name: Debug environment
        run: |
          echo "Workspace: ${{ github.workspace }}"
          dir ${{ github.workspace }}
          docker --version
          docker compose version
          docker ps -a

      - name: Pull latest images
        run: |
          cd ${{ github.workspace }}
          docker compose -f docker-compose.yml pull

      - name: Start containers
        run: |
          cd ${{ github.workspace }}
          docker compose -f docker-compose.yml up -d

      - name: Verify containers
        run: docker ps

      - name: Health check (FastAPI)
        run: |
          curl http://localhost:8000/ || exit 1

      - name: Health check (Streamlit)
        run: |
          curl http://localhost:8501/ || exit 1

      - name: Health check (Prometheus)
        run: |
          curl http://localhost:9090/-/healthy || exit 1

      - name: Health check (Grafana)
        run: |
          curl http://localhost:3000/api/health || exit 1

      - name: Health check (MLflow)
        run: |
          curl http://localhost:5000/ || exit 1
