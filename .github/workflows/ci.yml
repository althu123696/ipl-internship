name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: althu123696
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push FastAPI image
        run: |
          IMAGE_ID="ghcr.io/${{ github.repository }}/fastapi:latest"
          echo "Building and pushing $IMAGE_ID"
          docker buildx build --push -t "$IMAGE_ID" -f app/Dockerfile .

      - name: Build and push Streamlit image
        run: |
          IMAGE_ID="ghcr.io/${{ github.repository }}/streamlit:latest"
          echo "Building and pushing $IMAGE_ID"
          docker buildx build --push -t "$IMAGE_ID" -f streamlit/Dockerfile .

  deploy:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u althu123696 --password-stdin

      - name: Deploy with docker-compose
        run: |
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d
