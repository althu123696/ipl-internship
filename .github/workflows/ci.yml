name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: althu123696
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & Push FastAPI
        run: |
          docker buildx build --push \
            -t ghcr.io/althu123696/ipl-internship/fastapi:latest \
            -f app/Dockerfile .

      - name: Build & Push Streamlit
        run: |
          docker buildx build --push \
            -t ghcr.io/althu123696/ipl-internship/streamlit:latest \
            -f streamlit/Dockerfile .

  deploy:
    runs-on: [self-hosted, Windows, X64]   # match your runner labels
    needs: build
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify Docker availability
        shell: powershell
        run: |
          Write-Output "Checking Docker installation..."
          docker --version
          docker compose version

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: althu123696
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Deploy with Docker Compose
        shell: powershell
        run: |
          Write-Output "Starting deploy step..."
          docker compose -f docker-compose.yml -f docker-compose.override.yml pull
          docker compose -f docker-compose.yml -f docker-compose.override.yml up -d --remove-orphans
          Write-Output "Deploy step finished."
